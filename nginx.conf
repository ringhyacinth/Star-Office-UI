server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源
    location /static/ {
        alias /usr/share/nginx/html/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 字体文件
    location /fonts/ {
        alias /usr/share/nginx/html/fonts/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # API 代理 - 使用 docker 网络中的后端容器名
    location /api/ {
        rewrite ^/api(/v1/.*)$ /api$1 break;
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://star-office-ui-backend-1:18791;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 精确匹配的状态端点
    location = /status {
        proxy_pass http://star-office-ui-backend-1:18791/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /agents {
        proxy_pass http://star-office-ui-backend-1:18791/agents;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /set_state {
        proxy_pass http://star-office-ui-backend-1:18791/set_state;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /health {
        proxy_pass http://star-office-ui-backend-1:18791/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /join {
        proxy_pass http://star-office-ui-backend-1:18791/join;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /invite {
        proxy_pass http://star-office-ui-backend-1:18791/invite;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /yesterday-memo {
        proxy_pass http://star-office-ui-backend-1:18791/yesterday-memo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /today-memo {
        proxy_pass http://star-office-ui-backend-1:18791/today-memo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /join-agent {
        proxy_pass http://star-office-ui-backend-1:18791/join-agent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /leave-agent {
        proxy_pass http://star-office-ui-backend-1:18791/leave-agent;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /agent-push {
        proxy_pass http://star-office-ui-backend-1:18791/agent-push;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /agent-approve {
        proxy_pass http://star-office-ui-backend-1:18791/agent-approve;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /agent-reject {
        proxy_pass http://star-office-ui-backend-1:18791/agent-reject;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /sync-memo {
        proxy_pass http://star-office-ui-backend-1:18791/sync-memo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /sources {
        proxy_pass http://star-office-ui-backend-1:18791/sources;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/settings/tokens {
        proxy_pass http://star-office-ui-backend-1:18791/api/settings/tokens;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其他所有请求 - 返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
