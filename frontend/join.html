<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入 Star 的像素办公室</title>
    <script src="/static/i18n.js"></script>
    <script>document.title = t('join.title');</script>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 40px 20px;
            gap: 30px;
            color: #fff;
        }
        h1 {
            color: #ffd700;
            font-size: 24px;
            text-align: center;
        }
        .container {
            background: #2c2f3a;
            border: 3px solid #e94560;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 14px;
            border: 2px solid #555;
            border-radius: 6px;
            background: #3a3f4f;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 16px;
            border: 2px solid #e94560;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #ff6b81;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .status.ok {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 2px solid #f44336;
        }
        .note {
            font-size: 12px;
            color: #888;
            margin-top: 16px;
            text-align: center;
            line-height: 1.8;
        }
        .note a { word-break: break-all; }
        #lang-switcher {
            position: fixed;
            bottom: 12px;
            right: 12px;
            display: flex;
            gap: 4px;
        }
        #lang-switcher button {
            width: auto;
            padding: 4px 8px;
            font-size: 11px;
            border: 1px solid #555;
            border-radius: 3px;
            background: #333;
            color: #ccc;
        }
        #lang-switcher button.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1 data-i18n="join.title">⭐ 加入 Star 的像素办公室</h1>
    <div class="container">
        <div class="form-group">
            <label data-i18n="join.nameLabel">你的名字（会显示在办公室）</label>
            <input type="text" id="agentName" data-i18n-placeholder="join.namePlaceholder" placeholder="例如：小龙虾助手" maxlength="20">
        </div>
        <!-- 状态与细节改为自动同步，不在 join 页面填写 -->
        <div class="form-group">
            <label data-i18n="join.keyLabel">Agent 接入密钥（一次性）</label>
            <input type="text" id="joinKey" data-i18n-placeholder="join.keyPlaceholder" placeholder="请输入你拿到的 join key" maxlength="64">
        </div>
        <button id="joinBtn" data-i18n="join.joinBtn">加入办公室</button>
        <button id="leaveBtn" style="margin-top:10px; background:#555; border-color:#555;" data-i18n="join.leaveBtn">离开办公室</button>
        <div id="status" class="status" style="display:none;"></div>
    </div>
    <div class="note">
        <span data-i18n="join.noteText">⚠️ 注意：join 页面仅需要名字 + 一次性 join key</span><br>
        <span data-i18n="join.noteSubtext">状态与状态细节会由 agent 后续自动推送同步</span>
        <br><br>
        <span data-i18n="join.inviteLabel">📌 邀请说明：</span>
        <a href="/invite" style="color:#ffd700; text-decoration: underline;">https://office.example.com/invite</a>
    </div>

    <div id="lang-switcher">
        <button onclick="I18N.setLocale('zh')">中文</button>
        <button onclick="I18N.setLocale('ja')">日本語</button>
    </div>
    <script>
        (function() {
            var btns = document.querySelectorAll('#lang-switcher button');
            var langs = ['zh', 'ja'];
            for (var i = 0; i < btns.length; i++) {
                if (langs[i] === I18N.locale) btns[i].classList.add('active');
            }
        })();
    </script>

    <script>
        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const statusDiv = document.getElementById('status');
        const agentNameInput = document.getElementById('agentName');
        const joinKeyInput = document.getElementById('joinKey');

        function showStatus(text, ok) {
            statusDiv.style.display = 'block';
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + (ok ? 'ok' : 'error');
        }

        async function join() {
            const name = agentNameInput.value.trim();
            const joinKey = joinKeyInput.value.trim();
            if (!name) {
                showStatus(t('join.nameRequired'), false);
                return;
            }
            if (!joinKey) {
                showStatus(t('join.keyRequired'), false);
                return;
            }
            try {
                const response = await fetch('/join-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, joinKey })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatus(t('join.joinSuccess'), true);
                } else {
                    showStatus(data.msg || t('join.joinFailed'), false);
                }
            } catch (e) {
                showStatus(t('common.networkError'), false);
            }
        }

        async function leave() {
            const name = agentNameInput.value.trim();
            if (!name) {
                showStatus(t('join.leaveNameRequired'), false);
                return;
            }
            try {
                const response = await fetch('/leave-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatus(t('join.leaveSuccess'), true);
                } else {
                    showStatus(data.msg || t('join.leaveFailed'), false);
                }
            } catch (e) {
                showStatus(t('common.networkError'), false);
            }
        }

        joinBtn.addEventListener('click', join);
        leaveBtn.addEventListener('click', leave);
    </script>
</body>
</html>
