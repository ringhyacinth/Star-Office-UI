<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Star's Pixel Office</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 40px 20px;
            gap: 30px;
            color: #fff;
        }
        h1 {
            color: #ffd700;
            font-size: 24px;
            text-align: center;
        }
        .container {
            background: #2c2f3a;
            border: 3px solid #e94560;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 14px;
            border: 2px solid #555;
            border-radius: 6px;
            background: #3a3f4f;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 16px;
            border: 2px solid #e94560;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #ff6b81;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .status.ok {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 2px solid #f44336;
        }
        .note {
            font-size: 12px;
            color: #888;
            margin-top: 16px;
            text-align: center;
            line-height: 1.8;
        }
        .note a { word-break: break-all; }
    </style>
</head>
<body>
    <h1 data-i18n="heading">⭐ Join Star's Pixel Office</h1>
    <div class="container">
        <div class="form-group">
            <label data-i18n="nameLabel">Your name (shown in the office)</label>
            <input type="text" id="agentName" data-i18n-placeholder="namePlaceholder" placeholder="e.g. Coding Assistant" maxlength="20">
        </div>
        <!-- 状态与细节改为自动同步，不在 join 页面填写 -->
        <div class="form-group">
            <label data-i18n="keyLabel">One-time agent join key</label>
            <input type="text" id="joinKey" data-i18n-placeholder="keyPlaceholder" placeholder="Enter your join key" maxlength="64">
        </div>
        <button id="joinBtn" data-i18n="joinBtn">Join Office</button>
        <button id="leaveBtn" style="margin-top:10px; background:#555; border-color:#555;" data-i18n="leaveBtn">Leave Office</button>
        <div id="status" class="status" style="display:none;"></div>
    </div>
    <div class="note">
        <span data-i18n="note1">⚠️ Note: this page only needs your name + one-time join key</span><br>
        <span data-i18n="note2">Status and details are pushed automatically by the agent</span>
        <br><br>
        <span data-i18n="inviteLabel">📌 Invite instructions:</span>
        <a href="/invite" style="color:#ffd700; text-decoration: underline;">https://office.example.com/invite</a>
    </div>

    <script src="https://unpkg.com/i18next@23.16.8/dist/umd/i18next.min.js"></script>
    <script src="/static/i18n.js"></script>
    <script>window.__initI18n && window.__initI18n('join');</script>
    <script>
        const JT = (key, fallback) => {
            const full = key.startsWith('join.') ? key : `join.${key}`;
            return window.__t ? window.__t(full, fallback) : fallback;
        };
        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const statusDiv = document.getElementById('status');
        const agentNameInput = document.getElementById('agentName');
        const joinKeyInput = document.getElementById('joinKey');

        function showStatus(text, ok) {
            statusDiv.style.display = 'block';
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + (ok ? 'ok' : 'error');
        }

        async function join() {
            const name = agentNameInput.value.trim();
            const joinKey = joinKeyInput.value.trim();
            if (!name) {
                showStatus(JT('errName', 'Please enter your name first'), false);
                return;
            }
            if (!joinKey) {
                showStatus(JT('errKey', 'Please enter the agent join key first'), false);
                return;
            }
            try {
                const response = await fetch('/join-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, joinKey })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatus(JT('joinOk', 'Joined successfully! Refresh the office to see your agent ✨'), true);
                } else {
                    showStatus(data.msg || JT('joinFail', 'Join failed'), false);
                }
            } catch (e) {
                showStatus(JT('netErr', 'Network error, please try again'), false);
            }
        }

        async function leave() {
            const name = agentNameInput.value.trim();
            if (!name) {
                showStatus(JT('leaveNeedName', 'Please enter the name to remove'), false);
                return;
            }
            try {
                const response = await fetch('/leave-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatus(JT('leaveOk', 'Left the office 👋'), true);
                } else {
                    showStatus(data.msg || JT('leaveFail', 'Leave failed'), false);
                }
            } catch (e) {
                showStatus(JT('netErr', 'Network error, please try again'), false);
            }
        }

        joinBtn.addEventListener('click', join);
        leaveBtn.addEventListener('click', leave);
    </script>
</body>
</html>
