<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star のピクセルオフィスに参加</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 40px 20px;
            gap: 30px;
            color: #fff;
            position: relative;
        }
        h1 {
            color: #ffd700;
            font-size: 24px;
            text-align: center;
        }
        .container {
            background: #2c2f3a;
            border: 3px solid #e94560;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 14px;
            border: 2px solid #555;
            border-radius: 6px;
            background: #3a3f4f;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 16px;
            border: 2px solid #e94560;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #ff6b81;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .status.ok {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 2px solid #f44336;
        }
        .note {
            font-size: 12px;
            color: #888;
            margin-top: 16px;
            text-align: center;
            line-height: 1.8;
        }
        .note a { word-break: break-all; color: #ffd700; text-decoration: underline; }
        #lang-switcher {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.88);
            border: 2px solid #e94560;
            border-radius: 999px;
            padding: 4px;
            display: flex;
            gap: 4px;
        }
        #lang-switcher button {
            width: auto;
            border: 1px solid #475569;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 11px;
            background: #334155;
        }
        #lang-switcher button.active {
            background: #e94560;
            border-color: #ffd700;
        }
    </style>
</head>
<body>
    <div id="lang-switcher">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="ja">JA</button>
        <button type="button" data-lang="zh">ZH</button>
    </div>

    <h1 id="page-title">⭐ Star のピクセルオフィスに参加</h1>
    <div class="container">
        <div class="form-group">
            <label id="label-agent-name" for="agentName">あなたの名前（オフィスに表示されます）</label>
            <input type="text" id="agentName" placeholder="例：ザリガニアシスタント" maxlength="20">
        </div>
        <div class="form-group">
            <label id="label-join-key" for="joinKey">Agent 接続キー（使い切り）</label>
            <input type="text" id="joinKey" placeholder="受け取った join key を入力してください" maxlength="64">
        </div>
        <button id="joinBtn">オフィスに参加</button>
        <button id="leaveBtn" style="margin-top:10px; background:#555; border-color:#555;">オフィスから退出</button>
        <div id="status" class="status" style="display:none;"></div>
    </div>

    <div class="note">
        <span id="note-line-1">⚠️ 注意：joinページで必要なのは名前 + 使い切りjoin keyのみ</span><br>
        <span id="note-line-2">ステータスと詳細は後続でagentが自動送信して同期します</span>
        <br><br>
        <span id="note-line-3">📌 招待の案内：</span>
        <a href="/invite">https://office.example.com/invite</a>
    </div>

    <script>
        const LANG_KEY = 'starOfficeLang';
        const LEGACY_LANG_KEY = 'starOfficeUILang';
        const I18N = {
            en: {
                title: 'Join Star Pixel Office',
                pageTitle: '⭐ Join Star Pixel Office',
                labelAgentName: 'Your name (shown in office)',
                labelJoinKey: 'Agent Join Key (one-time)',
                placeholderAgentName: 'e.g. Lobster Assistant',
                placeholderJoinKey: 'Enter the join key you received',
                joinBtn: 'Join Office',
                leaveBtn: 'Leave Office',
                note1: '⚠️ Required on this page: name + one-time join key',
                note2: 'Status/detail will be auto-synced by the agent afterward.',
                note3: '📌 Invite guide:',
                statusNameRequired: 'Please enter your name first',
                statusJoinKeyRequired: 'Please enter your agent join key first',
                statusJoinSuccess: 'Joined successfully! Refresh office to see it ✨',
                statusJoinFail: 'Failed to join',
                statusNetworkError: 'Network error. Please retry.',
                statusLeaveNameRequired: 'Enter the name to leave first',
                statusLeaveSuccess: 'Left the office 👋',
                statusLeaveFail: 'Failed to leave'
            },
            ja: {
                title: 'Star のピクセルオフィスに参加',
                pageTitle: '⭐ Star のピクセルオフィスに参加',
                labelAgentName: 'あなたの名前（オフィスに表示されます）',
                labelJoinKey: 'Agent 接続キー（使い切り）',
                placeholderAgentName: '例：ザリガニアシスタント',
                placeholderJoinKey: '受け取った join key を入力してください',
                joinBtn: 'オフィスに参加',
                leaveBtn: 'オフィスから退出',
                note1: '⚠️ 注意：joinページで必要なのは名前 + 使い切りjoin keyのみ',
                note2: 'ステータスと詳細は後続でagentが自動送信して同期します',
                note3: '📌 招待の案内：',
                statusNameRequired: '先に名前を入力してください',
                statusJoinKeyRequired: '先にAgent接続キーを入力してください',
                statusJoinSuccess: '参加完了！オフィスを更新すると表示されます ✨',
                statusJoinFail: '参加に失敗しました',
                statusNetworkError: 'ネットワークエラーです。再試行してください',
                statusLeaveNameRequired: '先に退出する名前を入力してください',
                statusLeaveSuccess: 'オフィスから退出しました 👋',
                statusLeaveFail: '退室失敗'
            },
            zh: {
                title: '加入 Star 像素办公室',
                pageTitle: '⭐ 加入 Star 像素办公室',
                labelAgentName: '你的名字（会显示在办公室）',
                labelJoinKey: 'Agent 连接密钥（一次性）',
                placeholderAgentName: '例如：龙虾助手',
                placeholderJoinKey: '输入你收到的 join key',
                joinBtn: '加入办公室',
                leaveBtn: '离开办公室',
                note1: '⚠️ 本页只需要：名字 + 一次性 join key',
                note2: '状态与详情会由 agent 后续自动推送并同步。',
                note3: '📌 邀请说明：',
                statusNameRequired: '请先输入名字',
                statusJoinKeyRequired: '请先输入 Agent 连接密钥',
                statusJoinSuccess: '加入成功！刷新办公室即可看到 ✨',
                statusJoinFail: '加入失败',
                statusNetworkError: '网络错误，请重试',
                statusLeaveNameRequired: '请先输入要离开的名字',
                statusLeaveSuccess: '已离开办公室 👋',
                statusLeaveFail: '离开失败'
            }
        };

        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const statusDiv = document.getElementById('status');
        const agentNameInput = document.getElementById('agentName');
        const joinKeyInput = document.getElementById('joinKey');
        const switcherButtons = Array.from(document.querySelectorAll('#lang-switcher button[data-lang]'));
        let currentLang = resolveLang(readSavedLang() || navigator.language || 'ja');
        let lastStatusState = null;

        function readSavedLang() {
            try {
                return localStorage.getItem(LANG_KEY) || localStorage.getItem(LEGACY_LANG_KEY);
            } catch (e) {
                return null;
            }
        }

        function saveLang(lang) {
            try {
                localStorage.setItem(LANG_KEY, lang);
                localStorage.removeItem(LEGACY_LANG_KEY);
            } catch (e) {}
        }

        function resolveLang(raw) {
            const v = String(raw || '').toLowerCase();
            if (v.startsWith('ja')) return 'ja';
            if (v.startsWith('zh')) return 'zh';
            if (v.startsWith('en')) return 'en';
            return 'ja';
        }

        function t(key) {
            return (I18N[currentLang] && I18N[currentLang][key]) || I18N.ja[key] || key;
        }

        function applyLanguage() {
            document.documentElement.lang = currentLang;
            document.title = t('title');
            document.getElementById('page-title').textContent = t('pageTitle');
            document.getElementById('label-agent-name').textContent = t('labelAgentName');
            document.getElementById('label-join-key').textContent = t('labelJoinKey');
            agentNameInput.placeholder = t('placeholderAgentName');
            joinKeyInput.placeholder = t('placeholderJoinKey');
            joinBtn.textContent = t('joinBtn');
            leaveBtn.textContent = t('leaveBtn');
            document.getElementById('note-line-1').textContent = t('note1');
            document.getElementById('note-line-2').textContent = t('note2');
            document.getElementById('note-line-3').textContent = t('note3');
            switcherButtons.forEach((btn) => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === currentLang);
            });
            if (lastStatusState) {
                renderStatus();
            }
        }

        function setLanguage(lang) {
            const next = resolveLang(lang);
            currentLang = next;
            saveLang(next);
            applyLanguage();
        }

        function renderStatus() {
            if (!lastStatusState) return;
            statusDiv.style.display = 'block';
            statusDiv.className = 'status ' + (lastStatusState.ok ? 'ok' : 'error');
            if (lastStatusState.raw) {
                statusDiv.textContent = lastStatusState.raw;
            } else {
                statusDiv.textContent = t(lastStatusState.key);
            }
        }

        function showStatusKey(key, ok) {
            lastStatusState = { key, ok };
            renderStatus();
        }

        function showStatusRaw(text, ok) {
            lastStatusState = { raw: text, ok };
            renderStatus();
        }

        async function join() {
            const name = agentNameInput.value.trim();
            const joinKey = joinKeyInput.value.trim();
            if (!name) {
                showStatusKey('statusNameRequired', false);
                return;
            }
            if (!joinKey) {
                showStatusKey('statusJoinKeyRequired', false);
                return;
            }
            try {
                const response = await fetch('/join-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, joinKey })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatusKey('statusJoinSuccess', true);
                } else {
                    showStatusRaw(data.msg || t('statusJoinFail'), false);
                }
            } catch (e) {
                showStatusKey('statusNetworkError', false);
            }
        }

        async function leave() {
            const name = agentNameInput.value.trim();
            if (!name) {
                showStatusKey('statusLeaveNameRequired', false);
                return;
            }
            try {
                const response = await fetch('/leave-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatusKey('statusLeaveSuccess', true);
                } else {
                    showStatusRaw(data.msg || t('statusLeaveFail'), false);
                }
            } catch (e) {
                showStatusKey('statusNetworkError', false);
            }
        }

        switcherButtons.forEach((btn) => {
            btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
        });
        joinBtn.addEventListener('click', join);
        leaveBtn.addEventListener('click', leave);
        window.addEventListener('storage', (event) => {
            if ((event.key === LANG_KEY || event.key === LEGACY_LANG_KEY) && event.newValue) {
                currentLang = resolveLang(event.newValue);
                applyLanguage();
            }
        });

        applyLanguage();
    </script>
</body>
</html>
