version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:18791"
    # 生产模式：不需要挂载，数据存储在容器内
    # 开发模式可取消注释以下 volumes
    # volumes:
    #   - ./state.json:/app/state.json:ro
    #   - ./agents-state.json:/app/agents-state.json:rw
    #   - ./join-keys.json:/app/join-keys.json:ro
    #   - ./memory:/app/memory:ro
    environment:
      - FLASK_ENV=development
      - API_TOKEN=${API_TOKEN}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    networks:
      - star-office-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - star-office-network

networks:
  star-office-network:
    driver: bridge
