name: frontend-app-ci

on:
  push:
    paths:
      - 'frontend-app/**'
      - '.github/workflows/frontend-app-ci.yml'
  pull_request:
    paths:
      - 'frontend-app/**'
      - '.github/workflows/frontend-app-ci.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
